[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --verbose
    --strict-markers
    --tb=short

markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (database, API endpoints)
    slow: Slow running tests
    financial: Tests for financial calculations (100% coverage required)
